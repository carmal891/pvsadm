name: Update Homebrew Formula on Release

on:
  release:
    types: [published]

jobs:
  update-homebrew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up environment
      run: |
        git config --global user.name "pvsadm GitHub Actions"
        git config --global user.email "pvsadmactions@github.com"

    - name: Generate GitHub App Token
      uses: actions/create-github-app-token@v1
      id: app-token
      with:
        app-id: ${{ vars.APP_ID }}
        private-key: ${{ secrets.PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}

    - name: Update Homebrew formula
      env:
        GITHUB_TOKEN: ${{ secrets.HOMEBREW_UPDATER_TOKEN}}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        RELEASE_VERSION=${{ github.event.release.tag_name }}
        echo "RELEASE VERSION FROM EVENT : $RELEASE_VERSION"
        NEW_VERSION=${RELEASE_VERSION#v}
        echo "RELEASE VERSION post trim : $NEW_VERSION"
        BASE_REPO_URL="https://github.com/${{ github.repository }}"
        BREW_TAP_REPO_URL="https://github.com/carmal891/homebrew-pvsadm"
        FORMULA_FILE="pvsadm.rb"
        ./ci/brew_formula_updater.sh "$BASE_REPO_URL" "$NEW_VERSION" "$BREW_TAP_REPO_URL" "$FORMULA_FILE"


